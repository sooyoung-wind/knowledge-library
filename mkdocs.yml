site_name: 소소한 지식 저장소
site_url: https://sooyoung-wind.github.io/knowledge-library/
site_description: 소소하지만 오래 남는 가이드, 노트, 레퍼런스를 모아두는 지식 저장소.
copyright: Inspired By Soo.Y

theme:
  name: material
  language: ko
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
  icon:
    logo: material/leaf-circle
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

nav:
  - Home: index.md
  - Guides:
      - gstack Guide: html/gstack-guide.html

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
