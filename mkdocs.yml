site_name: Knowledge Library
site_url: https://sooyoung-wind.github.io/knowledge-library/
site_description: A calm and luxurious archive for curated notes, guides, and reference pages.

theme:
  name: material
  language: ko
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guides:
      - gstack Guide: html/gstack-guide.html

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
